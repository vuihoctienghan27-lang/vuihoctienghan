<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum - Vui Học Tiếng Hàn</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Navbar Scripts -->
    <script src="assets/js/theme-picker.js"></script>
    <script src="assets/js/navbar.js"></script>
    
    <style>
        :root {
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --primary: #2563eb;
        }

        body {
            font-family: 'Pretendard', 'Inter', sans-serif;
            background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0 0 40px 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            padding: 40px 40px 80px 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            min-height: 50vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .icon-wip {
            font-size: 5em;
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
        }

        .title {
            font-size: 2em;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .desc {
            font-size: 1.1em;
            color: var(--text-sub);
            max-width: 500px;
            line-height: 1.6;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @media (max-width: 600px) {
            .container {
                margin: 0 15px;
                padding: 30px 20px;
            }
            .title { font-size: 1.7em; }
        }
    </style>
    <script src="assets/js/block.js"></script>
</head>
<body>

    <div class="container" style="margin-top: 30px;">
        <div class="icon-wip">🚧</div>
        <h1 class="title">Diễn đàn đang được xây dựng</h1>
        <p class="desc">Tính năng thảo luận và trao đổi kinh nghiệm học tập đang trong giai đoạn phát triển. Bạn vui lòng quay lại sau nhé!</p>
        
        <button onclick="window.location.href='index.html'" style="margin-top: 30px; padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 1.05em; cursor: pointer; transition: 0.2s;">
            Quay lại Trang Chủ
        </button>
    </div>

</body>
</html>
