<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Cá Nhân - Vui Học Tiếng Hàn</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg-card: rgba(255, 255, 255, 0.95); --text-main: #1f2937; --text-sub: #6b7280; --border: #e5e7eb; --blue-grad: var(--random-bg-gradient, linear-gradient(135deg, #1e40af 0%, #3b82f6 100%)); --primary: #2563eb;
                --c-moi: #cbd5e1; --c-hoc: #f472b6; --c-on: #60a5fa; --c-thanh: #34d399; }
        
        body { font-family: 'Pretendard', 'Inter', sans-serif !important; background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%); background-attachment: fixed; color: var(--text-main); margin: 0; padding: 0 0 40px 0; }
        * { box-sizing: border-box; }
        button, input, select { font-family: 'Pretendard', 'Inter', sans-serif !important; }

        /* BANNER & TABS */
        .wrapper { max-width: 900px; margin: 0 auto; background: rgba(255, 255, 255, 0.35); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 24px; padding: 30px 40px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05); width: 100%; box-sizing: border-box; }
        .blue-banner { background: var(--blue-grad); border-radius: 16px; padding: 30px 40px; color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3); margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .banner-left h2 { font-size: 2.5em; font-weight: 800; margin: 0 0 5px 0; line-height: 1.1; }
        .banner-left p { color: #dbeafe; margin: 0; font-weight: 500; }
        .banner-right { display: flex; gap: 10px; justify-content: flex-end; align-items: center; }
        .stat-box { background: rgba(255, 255, 255, 0.15); padding: 15px 20px; border-radius: 12px; text-align: center; min-width: 90px;}
        .stat-label { font-size: 0.75em; font-weight: 700; color: #e0e7ff; text-transform: uppercase; margin-bottom: 5px; }
        .stat-val { font-size: 1.8em; font-weight: 900; display: flex; align-items: baseline; justify-content: center; gap: 4px; line-height: 1;}
        .stat-val span { font-size: 0.45em; color: #dbeafe;}

        .tabs-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .tab-btn-flat { background: #f8fafc; border: 2px solid var(--border); color: var(--text-sub); padding: 18px; border-radius: 12px; font-size: 1.05em; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .tab-btn-flat:hover { border-color: #94a3b8; color: var(--text-main); }
        .tab-btn-flat.active { background: #eff6ff; border-color: #3b82f6; color: #1d4ed8; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MODAL & PROFILE */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); z-index: 99999; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-box { background: #fff; width: 95%; max-width: 500px; border-radius: 20px; padding: 30px; position: relative; max-height: 90vh; overflow-y: auto; transition: max-width 0.3s ease; }
        .close-btn { background: none; border: none; font-size: 1.8em; cursor: pointer; color: #9ca3af; line-height: 1; }
        .close-btn:hover { color: #1f2937; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #f3f4f6; padding-bottom: 15px; }

        /* THÔNG TIN, RANKING, BIỂU ĐỒ */
        .profile-card { background: #fff; border-radius: 16px; padding: 35px; border: 1px solid var(--border); }
        .section-title { font-size: 1.3em; font-weight: 800; margin-top: 0; margin-bottom: 25px; border-bottom: 2px solid #f3f4f6; padding-bottom: 15px; color: var(--text-main); }
        .info-row { display: flex; align-items: center; padding: 16px 0; border-bottom: 1px dashed var(--border); }
        .info-row:last-child { border-bottom: none; }
        .info-lbl { width: 35%; color: var(--text-sub); font-weight: 600; font-size: 0.95em; }
        .info-val { width: 65%; color: var(--text-main); font-weight: 700; font-size: 1.05em; }
        .btn-action-group { display: flex; gap: 15px; margin-top: 25px; }
        .btn-edit { background: #f3f4f6; color: #1f2937; border: none; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; flex: 1; font-size: 1em; transition: 0.2s;}
        .btn-edit:hover { background: #e5e7eb; }
        .btn-logout { background: transparent; color: #ef4444; border: 2px solid #fca5a5; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; flex: 1; font-size: 1em; transition: 0.2s;}
        .btn-logout:hover { background: #fef2f2; border-color: #ef4444; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 700; font-size: 0.9em; color: var(--text-sub); margin-bottom: 8px; }
        .form-control { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 1em; color: var(--text-main); transition: 0.2s; outline: none; background: white;}
        .form-control:focus { border-color: #3b82f6; }
        .form-control:disabled { background: #f9fafb; color: #9ca3af; cursor: not-allowed; }
        .btn-save { background: #3b82f6; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.05em; cursor: pointer; flex: 2; transition: 0.2s;}
        .btn-save:hover { background: #2563eb; }
        .chart-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .chart-btn { background: #fff; border: 2px solid var(--border); padding: 10px 20px; border-radius: 8px; font-weight: 700; color: var(--text-sub); cursor: pointer; transition: 0.2s; }
        .chart-btn.active { background: #1f2937; color: #fff; border-color: #1f2937; }
        .chart-scroll-box { width: 100%; overflow-x: auto; background: #fff; padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .chart-canvas-wrapper { height: 320px; }

        /* DRAWER MENU — căn trái */
        .side-drawer { position: fixed; top: 0; left: -300px; width: 280px; height: 100vh; background: #fff; box-shadow: 4px 0 15px rgba(0,0,0,0.1); z-index: 1001; transition: 0.3s ease; padding: 20px; box-sizing: border-box; }
        .side-drawer.open { left: 0; }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; opacity: 0; transition: 0.3s; }
        .drawer-overlay.show { display: block; opacity: 1; }
        .nav-link-side { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #64748b; font-weight: 700; font-size: 1.05em; padding: 12px 14px; border-radius: 10px; transition: 0.2s; margin-bottom: 4px; text-align: left; }
        .nav-link-side:hover { background: #f1f5f9; color: var(--primary); }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .wrapper { padding: 20px 15px; border-radius: 16px; }
            .blue-banner { flex-direction: column; align-items: flex-start; padding: 25px 20px; gap: 20px; }
            .banner-left h2 { font-size: 2.2em; }
            .banner-right { width: 100%; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
            .stat-box { flex: 1 1 30%; padding: 12px 5px; min-width: 30%; }
            .stat-label { font-size: 0.65em; }
            .stat-val { font-size: 1.4em; }
            .tabs-2x2 { gap: 10px; }
            .tab-btn-flat, .tab-btn { padding: 15px 5px; font-size: 0.95em; }
            .profile-card { padding: 20px 15px; }
            .info-lbl { width: 40%; font-size: 0.9em; }
            .info-val { width: 60%; font-size: 0.95em; }
            .modal-box { padding: 20px 15px; width: 95%; max-width: 100%; }
        }

        .up-stat-box { flex: 1; background: #f3f4f6; padding: 12px 5px; border-radius: 10px; text-align: center; }
        .up-stat-label { font-size: 0.7em; font-weight: 700; color: #6b7280; text-transform: uppercase; margin-bottom: 5px; }
        .up-stat-val { font-size: 1.4em; font-weight: 900; color: #111827; }
        .up-level-badge { display: inline-block; background: #fff7ed; color: #c2410c; padding: 4px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 800; border: 1px solid #ffedd5; margin-top: 5px; }
        @keyframes floatSticker { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-6px) rotate(8deg); } 100% { transform: translateY(0px) rotate(0deg); } }
        .cute-sticker { position: absolute; top: 10px; right: 15px; font-size: 3.2em; animation: floatSticker 3s ease-in-out infinite; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.25)); z-index: 100; user-select: none; }
    
        @media (max-width: 768px) {
            .global-nav, .wrapper, .container {
                margin-left: 15px !important;
                margin-right: 15px !important;
                width: calc(100% - 30px) !important;
            }
            .nav-desktop-links { display: none !important; }
        }
        
    </style>
    <script src="assets/js/block.js"></script>
    <script src="assets/js/theme-picker.js"></script>
    <script src="assets/js/navbar.js"></script>
</head>
<body>


    <div class="wrapper">
        <div class="blue-banner">
            <div class="banner-left">
                <div class="greeting-small">Xin chào,</div>
                <h2 id="bName">Đang tải...</h2>
                <p id="bEmail">Đang tải dữ liệu...</p>
            </div>
            <div class="banner-right">
                <div class="stat-box">
                    <div class="stat-label">Chuỗi</div>
                    <div class="stat-val" style="color: #fde047;" id="bStreak">0 <span>🔥</span></div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Hôm nay</div>
                    <div class="stat-val" style="color: #a7f3d0;" id="bTime">0 <span>⏱️</span></div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">EXP</div>
                    <div class="stat-val" style="color: #c084fc;" id="bExp">0 <span>⭐</span></div>
                </div>
            </div>
        </div>

        <div class="tabs-2x2">
            <button class="tab-btn-flat active" data-target="tab-info">👤 Thông tin</button>
            <button class="tab-btn-flat" data-target="tab-progress">📊 Tiến trình</button>
            <button class="tab-btn-flat" onclick="window.location.href='vocab.html'">📓 Sổ từ vựng</button>
            <button class="tab-btn-flat" data-target="tab-rank">🏆 Bảng xếp hạng</button>
        </div>

        <div id="tab-info" class="tab-content active">
            <div class="profile-card">
                <div id="viewMode" style="display: none;">
                    <div class="section-title">Hồ sơ của bạn</div>
                    <div class="info-row"><div class="info-lbl">Email đăng nhập</div><div class="info-val" id="vEmail" style="color: #3b82f6;"></div></div>
                    <div class="info-row"><div class="info-lbl">Họ và tên</div><div class="info-val" id="vName"></div></div>
                    <div class="info-row"><div class="info-lbl">Ngày sinh</div><div class="info-val" id="vDob"></div></div>
                    <div class="info-row"><div class="info-lbl">Mục đích học</div><div class="info-val" id="vPurpose"></div></div>
                    <div class="info-row"><div class="info-lbl">Thời gian đã học</div><div class="info-val" id="vDuration"></div></div>
                    <div class="btn-action-group">
                        <button class="btn-edit" onclick="toggleForm(true)">Sửa thông tin</button>
                        <button class="btn-logout" onclick="signOutUser()">Đăng xuất</button>
                    </div>
                </div>
                <div id="editMode" style="display: none;">
                    <div class="section-title">Cập nhật hồ sơ</div>
                    <div class="form-group"><label>Email đăng nhập</label><input type="email" id="fEmail" class="form-control" disabled></div>
                    <div class="form-group"><label>Họ và tên</label><input type="text" id="fName" class="form-control" placeholder="Nhập họ và tên..."></div>
                    <div class="form-group"><label>Ngày sinh</label><input type="date" id="fDob" class="form-control"></div>
                    <div class="form-group">
                        <label>Mục đích học tiếng Hàn</label>
                        <select id="fPurpose" class="form-control">
                            <option value="">-- Chọn mục đích --</option>
                            <option value="Du học">Du học</option>
                            <option value="Công việc">Công việc</option>
                            <option value="Sở thích / Du lịch">Sở thích / Du lịch</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Thời gian đã học</label>
                        <select id="fDuration" class="form-control">
                            <option value="">-- Chọn thời gian --</option>
                            <option value="Mới bắt đầu">Mới bắt đầu</option>
                            <option value="Dưới 6 tháng">Dưới 6 tháng</option>
                            <option value="6 tháng - 1 năm">6 tháng - 1 năm</option>
                            <option value="Trên 1 năm">Trên 1 năm</option>
                            <option value="Trên 2 năm">Trên 2 năm</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-save" onclick="saveProfile()">LƯU THÔNG TIN</button>
                        <button class="btn-edit" id="btnCancel" onclick="toggleForm(false)" style="flex: 1; display: none;">Hủy</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-progress" class="tab-content">
            <div class="chart-controls">
                <button class="chart-btn active" id="cBtn7" onclick="renderChart(7)">7 Ngày qua</button>
                <button class="chart-btn" id="cBtn30" onclick="renderChart(30)">30 Ngày qua</button>
            </div>
            <div class="chart-scroll-box">
                <div class="chart-canvas-wrapper" id="cWrap"><canvas id="myChart"></canvas></div>
            </div>
        </div>



        <div id="tab-rank" class="tab-content">
            <div class="profile-card" style="padding: 0; overflow: hidden; min-height: 200px;">
                <div id="lbList"></div>
            </div>
        </div>
    </div>



    <div id="userProfileModal" class="modal-overlay">
        <div class="modal-box" style="max-width: 400px; padding: 25px; position: relative;">
            <div id="cuteSticker" class="cute-sticker"></div>
            <div class="modal-header" style="margin-bottom: 10px; border-bottom: none; padding-bottom: 0;">
                <h3 class="modal-title" id="upName" style="font-size: 1.5em; text-align: center; width: 100%; padding-left: 20px;">Tên Thành Viên</h3>
                <button class="close-btn" onclick="closeUserProfile()" style="position: absolute; left: 15px; top: 15px; z-index: 101;">&times;</button>
            </div>
            <div style="text-align: center; margin-bottom: 20px;">
                <p id="upJoin" style="color: var(--text-sub); font-weight: 500; margin: 0 0 8px 0; font-size: 0.9em;">Gia nhập: Đang cập nhật...</p>
                <div id="upLevel" class="up-level-badge">Thường Dân</div>
            </div>
            <div style="display: flex; gap: 10px; justify-content: space-between;">
                <div class="up-stat-box">
                    <div class="up-stat-label">Chuỗi</div>
                    <div class="up-stat-val" style="color: #f59e0b;" id="upStreak">0</div>
                </div>
                <div class="up-stat-box">
                    <div class="up-stat-label">Tổng giờ</div>
                    <div class="up-stat-val" style="color: #10b981;" id="upTime">0</div>
                </div>
                <div class="up-stat-box">
                    <div class="up-stat-label">EXP</div>
                    <div class="up-stat-val" style="color: #8b5cf6;" id="upExp">0</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>


    <script src="assets/js/leaderboard.js"></script>
    <script src="assets/js/activity-tracker.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCoKD1zD63pQ-QotSTGFn0i8KMQmXzl8EU", authDomain: "vuihoctienghan2027.firebaseapp.com", projectId: "vuihoctienghan2027", storageBucket: "vuihoctienghan2027.firebasestorage.app", messagingSenderId: "346757373399", appId: "1:346757373399:web:526625b339fc9a1a523f92", measurementId: "G-JHCHNDDY1S" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        window.currentUserUid = null;
        window.globalDailyData = {};
        window.activeSeconds = 0;
        window.studyTimerInterval = null;
        window.leaderboardUsers = []; 

        document.querySelectorAll('.tab-btn-flat[data-target]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn-flat').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                e.currentTarget.classList.add('active');
                const tgt = document.getElementById(e.currentTarget.getAttribute('data-target'));
                if (tgt) tgt.classList.add('active');
                if (e.currentTarget.getAttribute('data-target') === 'tab-progress') renderChart(7);
                if (e.currentTarget.getAttribute('data-target') === 'tab-rank') renderLeaderboard();
            });
        });

        /* =====================================================
           HELPER: Ngày hôm nay theo múi giờ thiết bị
        ===================================================== */
        function getLocalDateStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
        function getLocalYesterdayStr() {
            const d = new Date(); d.setDate(d.getDate() - 1);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
        function calcTotalExp(data) {
            // 5 EXP mỗi 10 phút học + bonusEXP (streak bonus + hour bonus)
            return Math.max(0, Math.floor((data.totalStudyMinutes||0)/10)*5 + (data.bonusEXP||0));
        }

        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = 'index.html'; return; }
            window.currentUserUid = user.uid;

            document.getElementById('bEmail').innerText = user.email;
            document.getElementById('vEmail').innerText = user.email;
            document.getElementById('fEmail').value = user.email;

            // Ngày tạo tài khoản theo local timezone
            const creationDate = new Date(user.metadata.creationTime);
            const actualCreationDate = `${creationDate.getFullYear()}-${String(creationDate.getMonth()+1).padStart(2,'0')}-${String(creationDate.getDate()).padStart(2,'0')}`;

            db.collection("users").doc(user.uid).onSnapshot(doc => {
                const todayStr     = getLocalDateStr();
                const yesterdayStr = getLocalYesterdayStr();

                if (doc.exists) {
                    let d = doc.data();
                    let updates = {};
                    if (!d.joinDate) updates.joinDate = actualCreationDate;

                    /* ============================================
                       STREAK: Tính theo múi giờ thiết bị
                       - Đăng nhập hôm qua → streak++
                       - Bỏ ngày → streak về 1
                       - Đã đăng nhập hôm nay → giữ nguyên
                    ============================================ */
// Streak logic is now centralized in auth.js.

                    // Cập nhật danh sách bộ thẻ
                    let lists = d.vocabLists || [];
                    if (lists.includes('Mặc định')) lists[lists.indexOf('Mặc định')] = 'Đã lưu';
                    if (!lists.includes('Đã lưu')) lists.unshift('Đã lưu');
                    if (JSON.stringify(lists) !== JSON.stringify(d.vocabLists)) updates.vocabLists = lists;

                    if (Object.keys(updates).length > 0) db.collection("users").doc(user.uid).set(updates, { merge: true });

                    // Hiển thị thông tin
                    const totalExp = calcTotalExp(d);
                    document.getElementById('bName').innerText   = d.fullName || 'Học viên';
                    document.getElementById('bStreak').innerHTML = `${d.streakDays || 0} <span>🔥</span>`;
                    document.getElementById('bTime').innerHTML   = `${(d.dailyStudyData && d.dailyStudyData[todayStr]) || 0} <span>⏱️</span>`;
                    document.getElementById('bExp').innerHTML    = `${totalExp} <span>⭐</span>`;
                    window.globalDailyData = d.dailyStudyData || {};

                    if (d.fullName) {
                        document.getElementById('vName').innerText    = d.fullName;
                        document.getElementById('vDob').innerText     = formatDate(d.dob);
                        document.getElementById('vPurpose').innerText = d.studyPurpose || '—';
                        document.getElementById('vDuration').innerText = d.studyDuration || '—';
                        toggleForm(false);
                    } else {
                        toggleForm(true);
                        document.getElementById('btnCancel').style.display = 'none';
                    }

                    document.getElementById('fName').value     = d.fullName || '';
                    document.getElementById('fDob').value      = d.dob || '';
                    document.getElementById('fPurpose').value  = d.studyPurpose || '';
                    document.getElementById('fDuration').value = d.studyDuration || '';

                    if (window.setVocabLists) window.setVocabLists(lists);

                } else {
                    // User mới → tạo document
                    db.collection("users").doc(user.uid).set({
                        joinDate: actualCreationDate,
                        lastLoginDate: todayStr,
                        streakDays: 1,
                        streakBonusDays: 1,
                        bonusEXP: 0,
                        totalStudyMinutes: 0,
                        vocabLists: ['Đã lưu']
                    }, { merge: true });
                }
            });


        });

        function signOutUser() { auth.signOut().then(() => { window.location.href = 'index.html'; }); }
        function toggleForm(isEditing) { document.getElementById('viewMode').style.display = isEditing ? 'none' : 'block'; document.getElementById('editMode').style.display = isEditing ? 'block' : 'none'; document.getElementById('btnCancel').style.display = 'block'; }
        function saveProfile() { 
            const name = document.getElementById('fName').value.trim(); 
            if(!name) return Swal.fire({icon: 'error', title: 'Lỗi', text: 'Vui lòng nhập Họ và tên!', confirmButtonColor: '#2563eb'}); 
            db.collection("users").doc(window.currentUserUid).set({ 
                fullName: name, 
                dob: document.getElementById('fDob').value, 
                studyPurpose: document.getElementById('fPurpose').value, 
                studyDuration: document.getElementById('fDuration').value 
            }, {merge: true}).then(() => Swal.fire({icon: 'success', title: 'Thành công', text: 'Lưu thông tin thành công!', confirmButtonColor: '#2563eb'})); 
        }
        function formatDate(dateStr) { if(!dateStr) return '—'; const parts = dateStr.split('-'); return parts.length === 3 ? `${parts[2]}/${parts[1]}/${parts[0]}` : dateStr; }

        let myChartInstance = null;
        function renderChart(days) {
            document.getElementById('cBtn7').classList.remove('active'); document.getElementById('cBtn30').classList.remove('active');
            document.getElementById(days === 7 ? 'cBtn7' : 'cBtn30').classList.add('active');
            if(myChartInstance) myChartInstance.destroy();
            let labels = [], dataPoints = [];
            for (let i = days - 1; i >= 0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                labels.push(`${d.getDate()}/${d.getMonth() + 1}`); dataPoints.push(window.globalDailyData[key] || 0);
            }
            document.getElementById('cWrap').style.width = days === 7 ? '100%' : '1200px';
            myChartInstance = new Chart(document.getElementById('myChart').getContext('2d'), { type: 'bar', data: { labels: labels, datasets: [{ data: dataPoints, backgroundColor: '#3b82f6', borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        }

        function getLevelName(exp) {
            if (exp > 3000) return 'Trạng Nguyên 👑';
            if (exp >= 1001) return 'Thượng Thư 📜';
            if (exp >= 401)  return 'Tú Tài 🖋️';
            if (exp >= 51)   return 'Sĩ Tử 🕯️';
            return 'Thường Dân 🌱';
        }

        function closeUserProfile() {
            document.getElementById('userProfileModal').style.display = 'none';
        }
    </script>
    <script src="assets/js/menu.js"></script>
</body>
</html>
